<!doctype html>
<html lang="en">
    <head>
        <title>Title</title>
        <!-- Required meta tags -->
        <meta charset="utf-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, shrink-to-fit=no"
        />

        <!-- Bootstrap CSS v5.2.1 -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
            crossorigin="anonymous"
        />
         <style>
            body{
                background: linear-gradient(120deg,pink,rgb(233, 168, 168),rgb(229, 194, 129),rgb(238, 238, 177),rgb(226, 169, 226));
                background-size: 750% 750%;
                animation: fa 9s ease 2s infinite;
            }
            @keyframes fa {
                0%,100%{
                    background-position: 0% 50%;
                }
                50%{
                    background-position: 100%;
                }
            }
        </style>
    </head>

    <body>
        <header>
            <!-- place navbar here -->
        </header>
        <main>
            <h2 class="text-center my-3 text-light">Register with us!!</h2>
            <div
                class="container my-4 col-4"
            >
                <form class="p-4 bg-warning" action="login.html">
                    <div class="form-floating mb-3 my-3">
                        <input
                            type="text"
                            class="form-control"
                            name="formId1"
                            id="name"
                            placeholder=""
                        />
                        <label for="formId1">Name</label>
                    </div>
                    <div class="form-floating mb-3">
                        <input
                            type="email"
                            class="form-control"
                            name="formId1"
                            id="email"
                            placeholder=""
                        />
                        <label for="formId1">Email</label>
                    </div>
                    <div class="form-floating mb-3">
                        <input
                            type="number"
                            class="form-control"
                            name="phone"
                            id="formId1"
                            placeholder=""
                        />
                        <label for="formId1">Phone</label>
                    </div>
                    <div class="form-floating mb-3">
                        <input
                            type="text"
                            class="form-control"
                            name="formId1"
                            id="uname"
                            placeholder=""
                        />
                        <label for="formId1">Username</label>
                    </div>
                    <div class="form-floating mb-3">
                        <input
                            type="password"
                            class="form-control"
                            name="formId1"
                            id="paswd"
                            placeholder=""
                        />
                        <label for="formId1">Password</label>
                    </div>
                    <div class="mb-3">
                        <label for="" class="form-label">City</label>
                        <select
                            class="form-select form-select-lg"
                            name=""
                            id="city"
                        >
                            <option selected>Select one</option>
                            <option value="">New Delhi</option>
                            <option value="">Mumbai</option>
                            <option value="">Banaras</option>
                        </select>
                    </div>
                    
                    <button id="signUp"
                        type="submit"
                        class="btn btn-success"
                    >
                        Sign Up
                    </button>
                    <script>
                  const signUp=document.getElementById("signUp") 
                  signUp.addEventListener("click",()=>{
                  const uname=document.getElementById("uname").value
                  const unameReg=/^[a-zA-Z\d]+$/
                  const paswd=document.getElementById("paswd").value
                  const paswdReg=/^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,16}$/
                  const name=document.getElementById("name").value
                  const nameReg=/^[a-zA-Z\s]+$/
                  const phone=document.getElementById("phone").value
                  const phoneReg=/^[\d{10}]+$/
                  const email=document.getElementById("email").value
                  const emailReg=/^[^\s@]+@[^\s@]+\.[^\s@]+$/
                //   const city=document.getElementById("city").value
                  if (!unameReg.test(uname)) {
                    alert("Enter valid username")
                  }
                 if (!paswdReg.test(paswd)) {
                alert("password must contain atleast one upper,lower and digits")
                     }
                     if (!emailReg.test(email)) {
                        alert("Enter valid email")
                     }
                     if (!phoneReg.test(phone)) {
                        alert("Enter only 10 digit")
                     }
                     if (!nameReg.test(name)) {
                        alert("name must contain only alphabets")
                     }
                    //  if (city=="") {
                    //     alert("select one city from dropdown list")
                    //  }
                        else {
                            alert("signUp successfully go for signIn process")
                        }
                        })
                    </script>
                    
                </form>
            </div>
            
        </main>
        <footer>
            <!-- place footer here -->
        </footer>
        <!-- Bootstrap JavaScript Libraries -->
        <script
            src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
            integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
            crossorigin="anonymous"
        ></script>

        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
            integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+"
            crossorigin="anonymous"
        ></script>
    </body>
</html>
