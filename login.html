<!doctype html>
<html lang="en">
    <head>
        <title>Title</title>
        <!-- Required meta tags -->
        <meta charset="utf-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, shrink-to-fit=no"
        />

        <!-- Bootstrap CSS v5.2.1 -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
            crossorigin="anonymous"
        />
        <style>
            body{
                background: linear-gradient(120deg,pink,rgb(233, 168, 168),rgb(229, 194, 129),rgb(238, 238, 177),rgb(226, 169, 226));
                background-size: 750% 750%;
                animation: fa 9s ease 2s infinite;
            }
            @keyframes fa {
                0%,100%{
                    background-position: 0% 50%;
                }
                50%{
                    background-position: 100%;
                }
            }
        </style>
    </head>

    <body>
        <header>
            <!-- place navbar here -->
        </header>
        <main>
            <h2 class="text-center text-light my-3">Login Here</h2>
            <div
                class="container col-4 my-4"
            >
                <form class="bg-warning p-4" action="#">
                    <div class="form-floating mb-3">
                        <input
                            type="text"
                            class="form-control"
                            name="formId1"
                            id="uname"
                            placeholder=""
                        />
                        <label for="formId1">Username</label>
                    </div>
                    <div class="form-floating mb-3">
                        <input
                            type="password"
                            class="form-control"
                            name="paswd"
                            id="paswd"
                            placeholder=""
                        />
                        <label for="formId1">Password</label>
                    </div>
                    <button id="signIn"
                        type="submit"
                        class="btn btn-success"
                    >
                        Sign in
                    </button>
                    <script>
                      const signIn=document.getElementById("signIn")
                      signIn.addEventListener("click",(e)=>{
                        e.preventDefault();  // stop form submission
                  const uname=document.getElementById("uname").value
                  const unameReg=/^[a-zA-Z\d]+$/
                  const paswd=document.getElementById("paswd").value
                  const paswdReg=/^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,16}$/
                  if (!unameReg.test(uname)) {
                    alert("Enter valid username")
                  }
         if (!paswdReg.test(paswd)) {
    alert("password must contain atleast one upper,lower and digits")
      }
    else{
      alert("signIn successfully")
      window.location.href = "home.html"; //redirect to home pg
       }

                      })
                        
                    </script>
                </form>
            </div>
            
        </main>
        <footer>
            <!-- place footer here -->
        </footer>
        <!-- Bootstrap JavaScript Libraries -->
        <script
            src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
            integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
            crossorigin="anonymous"
        ></script>

        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
            integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+"
            crossorigin="anonymous"
        ></script>
    </body>
</html>
